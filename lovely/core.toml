[manifest]
version = "1.0.0"
dump_lua = true
priority = -1

# plural handler (annoyingly fragile overwrite)
# also i pass the whole vars here, even though it's inefficient, just because it looks better
# whatever
[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = '''
assembled_string = assembled_string..(type(subpart) == 'string' and subpart or format_ui_value(args.vars[tonumber(subpart[1])]) or 'ERROR')
'''
position = "at"
payload = '''
assembled_string = assembled_string..(type(subpart) == 'string' and subpart or (Spectrallib.pluralize and Spectrallib.pluralize(subpart[1], args.vars)) or format_ui_value(args.vars[tonumber(subpart[1])]) or 'ERROR')
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/utils.lua"]'''
pattern = '''
assembled_string = assembled_string..(type(subpart) == 'string' and subpart or format_ui_value(args.vars[tonumber(subpart[1])]) or 'ERROR')
'''
position = "at"
payload = '''
assembled_string = assembled_string..(type(subpart) == 'string' and subpart or (Spectrallib.pluralize and Spectrallib.pluralize(subpart[1], args.vars)) or format_ui_value(args.vars[tonumber(subpart[1])]) or 'ERROR')
'''
match_indent = true

#i know its ugly but its to make sure it doesnt do stuff when talisman is installed
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "elseif eval_type == 'dollars' then"
position = "before"
payload = '''
elseif eval_type == 'e_chips' and not (SMODS.Mods.Talisman or SMODS.Mods.cdataman or {}).can_load then
    sound = 'slib_echips'
    amt = amt
    text = '^' .. number_format(amt) .. ' ' .. localize('k_chips')
    colour = Spectrallib.echips
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'e_mult' and not (SMODS.Mods.Talisman or SMODS.Mods.cdataman or {}).can_load then
    sound = 'slib_emult'
    amt = amt
    text = '^' .. number_format(amt) .. ' ' .. localize('k_mult')
    colour = slib_emult
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'ee_chips' and not (SMODS.Mods.Talisman or SMODS.Mods.cdataman or {}).can_load then
    sound = 'slib_eechips'
    amt = amt
    text = '^^' .. number_format(amt) .. ' ' .. localize('k_chips')
    colour = Spectrallib.echips
    config.type = 'fade'
    config.scale = 0.7
elseif eval_type == 'ee_mult' and not (SMODS.Mods.Talisman or SMODS.Mods.cdataman or {}).can_load then
    sound = 'slib_eemult'
    amt = amt
    text = '^^' .. number_format(amt) .. ' ' .. localize('k_mult')
    colour = slib_emult
    config.type = 'fade'
    config.scale = 0.7
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "local info_queue = {}"
position = "after"
payload = '''
if not Spectrallib.can_mods_load({"Cryptid", "Cryptlib"}) then
    if _c.cry_disabled or (_c.force_gameset and _c.force_gameset == 'disabled') then
        if _c.cry_disabled then
            if _c.cry_disabled.type == "card_dependency" then
                local name = Spectrallib.get_center(_c.cry_disabled.key) and localize{type = 'name_text', set = Spectrallib.get_center(_c.cry_disabled.key).set, key = _c.cry_disabled.key} or _c.cry_disabled.key
                info_queue[#info_queue+1] = {key = 'disabled_card_dependency', set = 'Other', specific_vars = {name}}
            elseif _c.cry_disabled.type == "mod_dependency" then
                local name = Spectrallib.cross_mod_names[_c.cry_disabled.key] or _c.cry_disabled.key
                info_queue[#info_queue+1] = {key = 'disabled_mod_dependency', set = 'Other', specific_vars = {name}}
            elseif _c.cry_disabled.type == "mod_conflict" then
                local name = SMODS.Mods[_c.cry_disabled.key].name
                info_queue[#info_queue+1] = {key = 'disabled_mod_conflict', set = 'Other', specific_vars = {name}}
            else
                if not (_c.force_gameset and _c.force_gameset ~= 'disabled') then
                    info_queue[#info_queue+1] = {key = 'disabled', set = 'Other'}
                end
            end
        else
            info_queue[#info_queue+1] = {key = 'disabled', set = 'Other'}
        end
    end
end'''
match_indent = true

# replace rarity badge with gameset
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "card_type = (debuffed and AUT.card_type ~= 'Enhanced') and localize('k_debuffed') or card_type"
position = "after"
payload = '''

if AUT.card_type == "Back" then
    card_type = localize('b_deck')
end
if AUT.card_type == "Tag" then
    card_type = localize('b_tag')
end
if AUT.card_type == "Blind" then
    card_type = localize('b_blind')
end
if AUT.card_type == "Content Set" then
    card_type = localize('k_content_set')
end
if card.gameset_select then
    card_type = localize('cry_gameset_'..card.config.center.force_gameset)
    if card_type == "ERROR" then
        card_type = localize('cry_gameset_custom')
    end
end
if not card.gameset_select and card.config.center and card.config.center.cry_disabled then
    card_type = localize('cry_gameset_disabled')
end
'''
match_indent = true

# Descriptions for Backs and Blinds in gameset UI
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "elseif _c.set == 'Tag' then"
position = "before"
payload = "elseif _c.set == 'Back' or _c.set == 'Blind' then localize{type = 'descriptions', key = _c.key, set = _c.set, nodes = desc_nodes, vars = specific_vars or {}}"
match_indent = true

# Draw midground layer
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if self.config.center.soul_pos and (self.config.center.discovered or self.bypass_discovery_center) then"
position = "after"
payload = '''
if not (SMODS.Mods["Cryptid"] or {}).can_load and self.config.center.soul_pos and self.config.center.soul_pos.extra and (self.config.center.discovered or self.bypass_discovery_center) then
    local scale_mod = 0.07-- + 0.02*math.cos(1.8*G.TIMERS.REAL) + 0.00*math.cos((G.TIMERS.REAL - math.floor(G.TIMERS.REAL))*math.pi*14)*(1 - (G.TIMERS.REAL - math.floor(G.TIMERS.REAL)))^3
    local rotate_mod = 0--0.05*math.cos(1.219*G.TIMERS.REAL) + 0.00*math.cos((G.TIMERS.REAL)*math.pi*5)*(1 - (G.TIMERS.REAL - math.floor(G.TIMERS.REAL)))^2
    self.children.floating_sprite2:draw_shader('dissolve',0, nil, nil, self.children.center,scale_mod, rotate_mod,nil, 0.1--[[ + 0.03*math.cos(1.8*G.TIMERS.REAL)--]],nil, 0.6)
    self.children.floating_sprite2:draw_shader('dissolve', nil, nil, nil, self.children.center, scale_mod, rotate_mod)
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "return create_UIBox_generic_options({contents ={create_tabs("
position = "before"
payload = '''
  local tabs = {

  }

  local def = G.GAME.DefineKeys and {
          label = localize('b_definitions'),
          tab_definition_function = G.UIDEF.define_keys,
        } or nil
  local decks = G.GAME.entr_bought_decks and #G.GAME.entr_bought_decks > 0 and {
          label = localize('b_decks'), 
          tab_definition_function = G.UIDEF.bought_decks,
        } or nil
  local stake = G.GAME.stake > 1 and {
          label = localize('b_stake'),
          tab_definition_function = G.UIDEF.current_stake,
        } or nil
  if def then tabs[#tabs+1] = def end
  if decks then tabs[#tabs+1] = decks end
  if stake then tabs[#tabs+1] = stake end
'''
match_indent = true


[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
        G.GAME.stake > 1 and {
          label = localize('b_stake'),
          tab_definition_function = G.UIDEF.current_stake,
        } or nil,
'''
position = "at"
payload = '''
        tabs[1],
        tabs[2],
        tabs[3],'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''
if v.name == 'Black Hole' or v.name == 'The Soul' or v.hidden then
    add = false
end
'''
position = 'before'
payload = '''
local _total_weight = 0
if v.set == "Back" or v.set == "Sleeve" then
    if Spectrallib.deck_or_sleeve(v.key) or G.GAME.used_jokers[v.key] then
        add = false
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
if self.ability.consumeable or self.ability.set == 'Joker' or (self.area and self.area == G.pack_cards) then
'''
position = "at"
payload = '''
if true then
'''
match_indent = true

# booster cards inherit the booster stickers and edition
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "card.T.x = self.T.x"
position = "before"
payload = '''
local edi = self.edition or {}
if edi.type and not (card.config.center and card.config.center.cry_force_edition) then
	card:set_edition({[edi.type] = true})
end
for k, v in pairs(SMODS.Stickers) do
	if self.ability[k] then
		card:add_sticker(k, true)
	end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if self.ability.name == 'The Wheel of Fortune' then"
position = "before"
payload = '''
if self.ability.name == "The Hanged Man" then
    for i = 1, #G.hand.highlighted do
        if SMODS.is_eternal(G.hand.highlighted[i]) then return false end
    end
end
'''
match_indent = true

# Immolate can't be used on Eternal cards
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "for k, v in ipairs(G.hand.cards) do temp_hand[#temp_hand+1] = v end"
position = "at"
payload = '''
for k, v in ipairs(G.hand.cards) do
    if not SMODS.is_eternal(v) then
        temp_hand[#temp_hand+1] = v
    end
end
'''
match_indent = true


# Death can't modify Eternal cards (redundant, but may help if Death can be used on more cards)
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if G.hand.highlighted[i] ~= rightmost then"
position = "at"
payload = "if G.hand.highlighted[i] ~= rightmost and (Spectrallib.death_can_eternal or SMODS.is_eternal(G.hand.highlighted[i])) then"
match_indent = true


# Trading Card can't destroy Eternals
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "G.GAME.current_round.discards_used <= 0 and #context.full_hand == 1 then"
position = "at"
payload = "G.GAME.current_round.discards_used <= 0 and #context.full_hand == 1 and not SMODS.is_eternal(context.other_card) then"
match_indent = true


# Sixth Sense can't destroy Eternals
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "if self.ability.name == 'Sixth Sense' and #context.full_hand == 1 and context.full_hand[1]:get_id() == 6 and G.GAME.current_round.hands_played == 0 then"
position = "at"
payload = "if self.ability.name == 'Sixth Sense' and #context.full_hand == 1 and context.full_hand[1]:get_id() == 6 and not SMODS.is_eternal(context.full_hand[1]) and G.GAME.current_round.hands_played == 0 then"
match_indent = true


